<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CS2 Match Stats</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --accent: #7c3aed;
      --accent-light: #a78bfa;
      --accent-dark: #5b21b6;
      --accent-bg: rgba(124, 58, 237, 0.12);
      --accent-border: rgba(124, 58, 237, 0.08);
      
      --bg-main: #f5f5f7;
      --bg-card: rgba(255, 255, 255, 0.72);
      --bg-hover: rgba(124, 58, 237, 0.06);
      --border: rgba(124, 58, 237, 0.08);
      
      --text-primary: #1d1d1f;
      --text-secondary: #6e6e73;
      --text-muted: #86868b;
      
      --ct-color: #3b82f6;
      --ct-bg: rgba(59, 130, 246, 0.12);
      --t-color: #ef4444;
      --t-bg: rgba(239, 68, 68, 0.12);
      
      --green: #22c55e;
      --red: #ef4444;
      --yellow: #eab308;
      --blue: #3b82f6;
      
      --shadow-sm: 0 1px 2px rgba(124, 58, 237, 0.04);
      --shadow-md: 0 4px 12px rgba(124, 58, 237, 0.08);
      --shadow-lg: 0 8px 24px rgba(124, 58, 237, 0.12);
      
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
      
      --blur: blur(40px) saturate(180%);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', 'Noto Sans SC', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg-main);
      background-image: 
        radial-gradient(ellipse at 20% 20%, rgba(124, 58, 237, 0.08) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 80%, rgba(59, 130, 246, 0.06) 0%, transparent 50%);
      color: var(--text-primary);
      line-height: 1.6;
      min-height: 100vh;
    }

    /* Header */
    .header {
      background: var(--bg-card);
      backdrop-filter: var(--blur);
      -webkit-backdrop-filter: var(--blur);
      border-bottom: 1px solid var(--accent-border);
      padding: 0 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      height: 56px;
      position: sticky;
      top: 0;
      z-index: 50;
      box-shadow: var(--shadow-sm);
    }

    .header-content {
      max-width: 1200px;
      margin: 0 auto;
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .logo-icon {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-dark) 100%);
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 700;
      color: white;
      box-shadow: var(--shadow-sm);
    }

    .logo-text h1 {
      font-size: 1.125rem;
      font-weight: 700;
      letter-spacing: -0.3px;
      color: var(--text-primary);
    }

    .logo-text span {
      font-size: 0.75rem;
      color: var(--text-muted);
      letter-spacing: 0.5px;
    }

    .lang-toggle {
      display: flex;
      gap: 6px;
    }

    .lang-btn {
      padding: 0.4rem 0.85rem;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-secondary);
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-size: 0.8rem;
      font-weight: 500;
      transition: all 0.15s ease;
    }

    .lang-btn:hover {
      background: var(--bg-hover);
      border-color: var(--accent);
      color: var(--accent);
    }

    .lang-btn.active {
      background: var(--accent-bg);
      border-color: var(--accent);
      color: var(--accent-dark);
      font-weight: 600;
    }

    /* Container */
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 2rem;
    }

    /* Page Header */
    .page-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
      padding-bottom: 1rem;
    }

    .page-title {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--text-primary);
      letter-spacing: -0.3px;
    }

    .refresh-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem 1rem;
      border: 1px solid var(--border);
      background: var(--bg-card);
      backdrop-filter: var(--blur);
      -webkit-backdrop-filter: var(--blur);
      color: var(--text-secondary);
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-size: 0.875rem;
      font-weight: 500;
      transition: all 0.15s ease;
      box-shadow: var(--shadow-sm);
    }

    .refresh-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
      box-shadow: var(--shadow-md);
    }

    /* Match List */
    .match-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .match-card {
      background: var(--bg-card);
      backdrop-filter: var(--blur);
      -webkit-backdrop-filter: var(--blur);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 1rem 1.25rem;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: var(--shadow-sm);
    }

    .match-card:hover {
      background: rgba(255, 255, 255, 0.9);
      border-color: var(--accent-light);
      box-shadow: var(--shadow-md);
      transform: translateY(-1px);
    }

    .match-info {
      display: flex;
      align-items: center;
      gap: 1.5rem;
    }

    .match-meta {
      color: var(--text-muted);
      font-size: 0.8rem;
    }

    .match-map-name {
      font-weight: 600;
      font-size: 1rem;
      color: var(--text-primary);
    }

    .match-right {
      text-align: right;
    }

    .match-date {
      color: var(--text-secondary);
      font-size: 0.875rem;
    }

    .match-time {
      color: var(--text-muted);
      font-size: 0.75rem;
    }

    /* Match Detail */
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      color: var(--accent);
      text-decoration: none;
      font-size: 0.875rem;
      font-weight: 500;
      margin-bottom: 1.5rem;
      padding: 0.5rem 0;
      transition: all 0.15s ease;
    }

    .back-link:hover {
      color: var(--accent-dark);
      gap: 0.6rem;
    }

    /* Match Header */
    .match-header {
      background: var(--bg-card);
      backdrop-filter: var(--blur);
      -webkit-backdrop-filter: var(--blur);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1.5rem;
      margin-bottom: 1.5rem;
      box-shadow: var(--shadow-md);
    }

    .match-title {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1rem;
    }

    .match-title h2 {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    .match-meta-row {
      display: flex;
      gap: 2rem;
      color: var(--text-secondary);
      font-size: 0.875rem;
    }

    .match-meta-item {
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .match-meta-item strong {
      color: var(--text-primary);
      font-weight: 600;
    }

    /* Scoreboard */
    .scoreboard {
      display: grid;
      grid-template-columns: 1fr 80px 1fr;
      gap: 0;
      margin-bottom: 1.5rem;
      border-radius: var(--radius-lg);
      overflow: hidden;
      box-shadow: var(--shadow-md);
    }

    .team-panel {
      background: var(--bg-card);
      backdrop-filter: var(--blur);
      -webkit-backdrop-filter: var(--blur);
      border: 1px solid var(--border);
    }

    .team-panel.ct {
      border-right: none;
      border-radius: var(--radius-lg) 0 0 var(--radius-lg);
    }

    .team-panel.t {
      border-left: none;
      border-radius: 0 var(--radius-lg) var(--radius-lg) 0;
    }

    .team-header {
      padding: 1rem 1.25rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      border-bottom: 1px solid var(--border);
    }

    .team-panel.ct .team-header {
      background: var(--ct-bg);
    }

    .team-panel.t .team-header {
      background: var(--t-bg);
    }

    .team-badge {
      width: 28px;
      height: 28px;
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      font-weight: 700;
      color: white;
    }

    .team-badge.ct {
      background: var(--ct-color);
    }

    .team-badge.t {
      background: var(--t-color);
    }

    .team-name {
      font-weight: 600;
      font-size: 0.9rem;
    }

    .team-panel.ct .team-name {
      color: var(--ct-color);
    }

    .team-panel.t .team-name {
      color: var(--t-color);
    }

    .vs-panel {
      background: linear-gradient(180deg, var(--bg-card) 0%, rgba(255,255,255,0.5) 100%);
      backdrop-filter: var(--blur);
      -webkit-backdrop-filter: var(--blur);
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .vs-text {
      font-size: 0.7rem;
      color: var(--text-muted);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .final-score {
      font-size: 2rem;
      font-weight: 700;
      margin-top: 2px;
      color: var(--text-primary);
    }

    /* Player Table */
    .player-table {
      width: 100%;
      border-collapse: collapse;
    }

    .player-table th,
    .player-table td {
      padding: 0.75rem 1rem;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }

    .player-table th {
      background: rgba(255, 255, 255, 0.4);
      font-weight: 600;
      font-size: 0.7rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }

    .player-table tr:last-child td {
      border-bottom: none;
    }

    .player-table tbody tr {
      transition: all 0.15s ease;
    }

    .player-table tbody tr:hover {
      background: var(--bg-hover);
    }

    .player-name-cell {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .player-avatar {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, var(--accent-bg) 0%, rgba(124, 58, 237, 0.06) 100%);
      border: 1px solid var(--accent-border);
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      color: var(--accent);
    }

    .player-name {
      font-weight: 500;
      font-size: 0.9rem;
    }

    .player-tag {
      font-size: 0.65rem;
      padding: 2px 6px;
      background: var(--ct-bg);
      border: 1px solid var(--ct-color);
      border-radius: 4px;
      color: var(--ct-color);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .event-weapon {
      font-size: 0.7rem;
      padding: 3px 8px;
      background: rgba(234, 179, 8, 0.1);
      border: 1px solid rgba(234, 179, 8, 0.3);
      border-radius: 4px;
      color: var(--yellow);
      font-weight: 600;
    }

    .stat-kills {
      color: var(--green);
      font-weight: 600;
    }

    .stat-deaths {
      color: var(--red);
      font-weight: 600;
    }

    .stat-assists {
      color: var(--text-secondary);
    }

    .stat-score {
      color: var(--text-secondary);
    }

    .stat-mvp {
      color: var(--yellow);
      font-weight: 600;
    }

    .stat-rating {
      color: var(--accent);
      font-weight: 700;
    }

    /* Rounds Section */
    .rounds-section {
      background: var(--bg-card);
      backdrop-filter: var(--blur);
      -webkit-backdrop-filter: var(--blur);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1.25rem;
      margin-top: 1.5rem;
      box-shadow: var(--shadow-md);
    }

    .section-title {
      font-size: 0.8rem;
      font-weight: 600;
      margin-bottom: 1rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }

    .rounds-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .round-btn {
      min-width: 44px;
      height: 36px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.5);
      color: var(--text-secondary);
      cursor: pointer;
      font-weight: 600;
      font-size: 0.8rem;
      transition: all 0.15s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      padding: 0 0.6rem;
    }

    .round-btn.ct {
      border-color: var(--ct-color);
      background: var(--ct-bg);
      color: var(--ct-color);
    }

    .round-btn.t {
      border-color: var(--t-color);
      background: var(--t-bg);
      color: var(--t-color);
    }

    .round-btn:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-sm);
    }

    .round-btn.selected {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
      background: var(--accent-bg);
    }

    .round-indicator {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      font-size: 0;
    }

    .round-btn.ct .round-indicator {
      background: var(--ct-color);
    }

    .round-btn.t .round-indicator {
      background: var(--t-color);
    }

    /* Round Detail */
    .round-detail {
      background: rgba(255, 255, 255, 0.5);
      backdrop-filter: var(--blur);
      -webkit-backdrop-filter: var(--blur);
      border-radius: var(--radius-md);
      padding: 1.25rem;
      margin-top: 1rem;
      border: 1px solid var(--border);
    }

    .round-detail-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
      padding-bottom: 0.75rem;
      border-bottom: 1px solid var(--border);
    }

    .round-detail-title {
      font-weight: 600;
      font-size: 1rem;
    }

    .round-result {
      font-size: 0.75rem;
      padding: 0.3rem 0.75rem;
      border-radius: var(--radius-sm);
    }

    .round-result.ct {
      background: var(--ct-bg);
      color: var(--ct-color);
    }

    .round-result.t {
      background: var(--t-bg);
      color: var(--t-color);
    }

    .event-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .event-item {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.75rem 1rem;
      background: rgba(255, 255, 255, 0.5);
      backdrop-filter: blur(10px);
      border-radius: var(--radius-sm);
      font-size: 0.875rem;
      border: 1px solid var(--border);
    }

    .event-icon {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      background: rgba(239, 68, 68, 0.15);
      color: var(--red);
    }

    .event-content {
      flex: 1;
    }

    /* Empty State */
    .empty-state {
      text-align: center;
      padding: 4rem 2rem;
      background: var(--bg-card);
      backdrop-filter: var(--blur);
      -webkit-backdrop-filter: var(--blur);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-md);
    }

    .empty-state h2 {
      font-size: 1.25rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
    }

    .empty-state p {
      color: var(--text-muted);
      font-size: 0.9rem;
    }

    /* Loading */
    .loading {
      text-align: center;
      padding: 3rem;
      color: var(--text-muted);
    }

    .loading-spinner {
      width: 40px;
      height: 40px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 1rem;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    /* Responsive */
    @media (max-width: 768px) {
      .container {
        padding: 1rem;
      }

      .match-card {
        flex-direction: column;
        align-items: flex-start;
        gap: 10px;
      }

      .scoreboard {
        grid-template-columns: 1fr;
      }

      .team-panel.ct {
        border-right: 1px solid var(--border);
        border-radius: var(--radius-lg) var(--radius-lg) 0 0;
      }

      .team-panel.t {
        border-left: 1px solid var(--border);
        border-top: none;
        border-radius: 0 0 var(--radius-lg) var(--radius-lg);
      }

      .vs-panel {
        border-left: 1px solid var(--border);
        border-right: 1px solid var(--border);
        padding: 0.75rem 0;
      }

      .player-table th:nth-child(5),
      .player-table td:nth-child(5),
      .player-table th:nth-child(6),
      .player-table td:nth-child(6) {
        display: none;
      }

      .match-right {
        text-align: left;
        margin-top: 8px;
      }
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="header-content">
      <div class="logo">
        <div class="logo-icon">CS</div>
        <div class="logo-text">
          <h1>CS2 Match Stats</h1>
          <span>MATCH RECORDER</span>
        </div>
      </div>
      <div class="lang-toggle">
        <button class="lang-btn active" data-lang="en" onclick="setLang('en')">EN</button>
        <button class="lang-btn" data-lang="zh" onclick="setLang('zh')">中文</button>
      </div>
    </div>
  </header>

  <div class="container" id="app">
    <div class="loading">
      <div class="loading-spinner"></div>
      <p>Loading...</p>
    </div>
  </div>

  <script>
    const t = {
      en: {
        loading: 'Loading...',
        matches: 'Match History',
        refresh: 'Refresh',
        back: 'Back',
        noMatches: 'No matches found',
        noMatchesDesc: 'Play a match with the CS2 Match Stats plugin enabled.',
        map: 'Map',
        date: 'Date',
        duration: 'Duration',
        rounds: 'Rounds',
        ct: 'CT',
        t: 'T',
        players: 'Players',
        kills: 'K',
        deaths: 'D',
        assists: 'A',
        score: 'Score',
        mvp: 'MVP',
        rating: 'Rating',
        bot: 'BOT',
        round: 'Round',
        winner: 'Winner',
        reason: 'Reason',
        events: 'Events',
        death: 'Death',
        planted: 'Bomb Planted',
        defused: 'Bomb Defused',
        ctWin: 'CT Win',
        tWin: 'T Win',
        bombExploded: 'Bomb Exploded',
        bombDefused: 'Bomb Defused',
        timeOut: 'Time Out',
        teamEliminated: 'Team Eliminated',
        error: 'Error',
        errorDesc: 'Please check if the API server is running.'
      },
      zh: {
        loading: '加载中...',
        matches: '对局记录',
        refresh: '刷新',
        back: '返回',
        noMatches: '暂无对局记录',
        noMatchesDesc: '请使用 CS2 Match Stats 插件进行游戏。',
        map: '地图',
        date: '日期',
        duration: '时长',
        rounds: '回合',
        ct: 'CT',
        t: 'T',
        players: '玩家',
        kills: '击杀',
        deaths: '死亡',
        assists: '助攻',
        score: '分数',
        mvp: 'MVP',
        rating: 'Rating',
        bot: 'BOT',
        round: '回合',
        winner: '获胜方',
        reason: '原因',
        events: '事件',
        death: '击杀',
        planted: '安放炸弹',
        defused: '拆除炸弹',
        ctWin: 'CT获胜',
        tWin: 'T获胜',
        bombExploded: '炸弹爆炸',
        bombDefused: '炸弹拆除',
        timeOut: '时间耗尽',
        teamEliminated: '队伍淘汰',
        error: '错误',
        errorDesc: '请检查API服务器是否运行。'
      }
    };

    let lang = 'en';
    let currentMatch = null;

    function setLang(newLang) {
      lang = newLang;
      localStorage.setItem('cs2-stats-lang', newLang);
      document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.dataset.lang === newLang));
      if (currentMatch) renderMatch(currentMatch);
      else loadMatches();
    }

    function _(key) {
      return t[lang][key] || key;
    }

    async function loadMatches() {
      const app = document.getElementById('app');
      try {
        const res = await fetch('/api/matches');
        const matches = await res.json();

        if (matches.length === 0) {
          app.innerHTML = `
            <div class="empty-state">
              <h2>${_('noMatches')}</h2>
              <p>${_('noMatchesDesc')}</p>
            </div>
          `;
          return;
        }

        const html = `
          <div class="page-header">
            <h1 class="page-title">${_('matches')}</h1>
            <button class="refresh-btn" onclick="loadMatches()">${_('refresh')}</button>
          </div>
          <div class="match-list">
            ${matches.map(m => `
              <div class="match-card" onclick="loadMatch('${m.filename}')">
                <div class="match-info">
                  <span class="match-map-name">${getMapName(m.mapName)}</span>
                  <span class="match-meta">${_('rounds')}: ${m.roundCount}</span>
                </div>
                <div class="match-right">
                  <span class="match-date">${new Date(m.timestamp).toLocaleDateString(lang === 'zh' ? 'zh-CN' : 'en-US')}</span>
                  <span class="match-time">${new Date(m.timestamp).toLocaleTimeString(lang === 'zh' ? 'zh-CN' : 'en-US', {hour: '2-digit', minute:'2-digit'})}</span>
                </div>
              </div>
            `).join('')}
          </div>
        `;
        app.innerHTML = html;
      } catch (e) {
        app.innerHTML = `
          <div class="empty-state">
            <h2>${_('error')}</h2>
            <p>${_('errorDesc')}</p>
          </div>
        `;
      }
    }

    async function loadMatch(filename) {
      const app = document.getElementById('app');
      try {
        const res = await fetch(`/api/match/${filename}`);
        currentMatch = await res.json();
        renderMatch(currentMatch);
      } catch (e) {
        app.innerHTML = `
          <div class="empty-state">
            <h2>${_('error')}</h2>
            <p>${e.message}</p>
          </div>
        `;
      }
    }

    function renderMatch(match) {
      const app = document.getElementById('app');
      const ctScore = match.Teams?.CT?.Score || 0;
      const tScore = match.Teams?.T?.Score || 0;
      const ctPlayers = Object.values(match.Teams?.CT?.Players || {});
      const tPlayers = Object.values(match.Teams?.T?.Players || {});

      // 如果队伍里没有玩家，尝试从 allPlayers 中获取
      if (ctPlayers.length === 0 && tPlayers.length === 0) {
        // 尝试遍历所有回合的玩家统计
        const allPlayerStats = {};
        (match.Rounds || []).forEach(round => {
          if (round.PlayerStats) {
            Object.entries(round.PlayerStats).forEach(([id, stats]) => {
              if (!allPlayerStats[id]) {
                allPlayerStats[id] = { Kills: 0, Deaths: 0, Assists: 0, Score: 0, MVPs: 0 };
              }
              allPlayerStats[id].Kills += stats.Kills || 0;
              allPlayerStats[id].Deaths += stats.Deaths || 0;
              allPlayerStats[id].Assists += stats.Assists || 0;
            });
          }
        });

        // 从事件中尝试获取玩家名字
        const playerNames = {};
        (match.Rounds || []).forEach(round => {
          (round.Events || []).forEach(e => {
            if (e.Attacker && !['World', 'Unknown'].includes(e.Attacker)) {
              playerNames[e.Attacker] = e.Attacker;
            }
            if (e.Victim && !['World', 'Unknown'].includes(e.Victim)) {
              playerNames[e.Victim] = e.Victim;
            }
          });
        });

        // 如果有玩家名字，按字母分成两队
        const names = Object.keys(playerNames);
        names.forEach((name, idx) => {
          const stats = allPlayerStats[Object.keys(allPlayerStats)[idx]] || { Kills: 0, Deaths: 0 };
          const player = {
            UniqueId: idx + 1,
            Name: name,
            IsBot: false,
            TeamKey: idx % 2 === 0 ? 'CT' : 'T',
            Kills: stats.Kills,
            Deaths: stats.Deaths,
            Assists: stats.Assists,
            Score: 0,
            MVPs: 0
          };
          if (player.TeamKey === 'CT') {
            ctPlayers.push(player);
          } else {
            tPlayers.push(player);
          }
        });
      }

      app.innerHTML = `
        <a class="back-link" href="#" onclick="loadMatches(); return false;">← ${_('back')}</a>

        <div class="match-header">
          <div class="match-title">
            <div>
              <h2>${getMapName(match.MapName)}</h2>
              <div class="match-meta-row">
                <span>${_('date')}: ${match.StartTime}</span>
                <span>${_('duration')}: ${formatDuration(match.Duration)}</span>
                <span>${_('rounds')}: ${match.Rounds?.length || 0}</span>
              </div>
            </div>
          </div>
        </div>

        <div class="scoreboard">
          <div class="team-panel ct">
            <div class="team-header">
              <div class="team-badge ct">CT</div>
              <span class="team-name">Counter-Terrorists</span>
            </div>
            <table class="player-table">
              <thead>
                <tr>
                  <th>${_('players')}</th>
                  <th>${_('kills')}</th>
                  <th>${_('deaths')}</th>
                  <th>${_('assists')}</th>
                  <th>${_('score')}</th>
                  <th>${_('mvp')}</th>
                  <th>${_('rating')}</th>
                </tr>
              </thead>
              <tbody>
                ${ctPlayers.length > 0 ? ctPlayers.map(p => `
                  <tr>
                    <td>
                      <div class="player-name-cell">
                        <div class="player-avatar"></div>
                        <span class="player-name">${escapeHtml(p.Name)}</span>
                        ${p.IsBot ? `<span class="player-tag">${_('bot')}</span>` : ''}
                      </div>
                    </td>
                    <td class="stat-kills">${p.Kills || 0}</td>
                    <td class="stat-deaths">${p.Deaths || 0}</td>
                    <td class="stat-assists">${p.Assists || 0}</td>
                    <td class="stat-score">${p.Score || 0}</td>
                    <td class="stat-mvp">${p.MVPs || 0}</td>
                    <td class="stat-rating">${p.Rating || '0.00'}</td>
                  </tr>
                `).join('') : `<tr><td colspan="7" style="color:var(--text-muted);text-align:center;padding:20px;">No player data</td></tr>`}
              </tbody>
            </table>
          </div>

          <div class="vs-panel">
            <span class="vs-text">VS</span>
            <span class="final-score">${ctScore}-${tScore}</span>
          </div>

          <div class="team-panel t">
            <div class="team-header">
              <div class="team-badge t">T</div>
              <span class="team-name">Terrorists</span>
            </div>
            <table class="player-table">
              <thead>
                <tr>
                  <th>${_('players')}</th>
                  <th>${_('kills')}</th>
                  <th>${_('deaths')}</th>
                  <th>${_('assists')}</th>
                  <th>${_('score')}</th>
                  <th>${_('mvp')}</th>
                  <th>${_('rating')}</th>
                </tr>
              </thead>
              <tbody>
                ${tPlayers.length > 0 ? tPlayers.map(p => `
                  <tr>
                    <td>
                      <div class="player-name-cell">
                        <div class="player-avatar"></div>
                        <span class="player-name">${escapeHtml(p.Name)}</span>
                        ${p.IsBot ? `<span class="player-tag">${_('bot')}</span>` : ''}
                      </div>
                    </td>
                    <td class="stat-kills">${p.Kills || 0}</td>
                    <td class="stat-deaths">${p.Deaths || 0}</td>
                    <td class="stat-assists">${p.Assists || 0}</td>
                    <td class="stat-score">${p.Score || 0}</td>
                    <td class="stat-mvp">${p.MVPs || 0}</td>
                    <td class="stat-rating">${p.Rating || '0.00'}</td>
                  </tr>
                `).join('') : `<tr><td colspan="7" style="color:var(--text-muted);text-align:center;padding:20px;">No player data</td></tr>`}
              </tbody>
            </table>
          </div>
        </div>

        <div class="rounds-section">
          <div class="section-title">${_('rounds')}</div>
          <div class="rounds-grid">
            ${(match.Rounds || []).map(r => `
              <button class="round-btn ${(r.Winner || 'ct').toLowerCase()}" onclick="showRound(${r.RoundNumber})" id="round-${r.RoundNumber}">
                ${r.RoundNumber}
                <span class="round-indicator"></span>
              </button>
            `).join('')}
          </div>
          <div id="round-detail"></div>
        </div>
      `;
    }

    function showRound(num) {
      const btn = document.getElementById(`round-${num}`);
      const detail = document.getElementById('round-detail');
      const round = currentMatch?.Rounds?.find(r => r.RoundNumber === num);

      if (!round) return;

      document.querySelectorAll('.round-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');

      const reason = getReason(round.Reason);
      const winner = round.Winner === 'CT' ? _('ctWin') : _('tWin');

      detail.innerHTML = `
        <div class="round-detail">
          <div class="round-detail-header">
            <span class="round-detail-title">${_('round')} #${num}</span>
            <span class="round-result ${(round.Winner || 'ct').toLowerCase()}">${winner}</span>
          </div>
          <div style="margin-bottom:15px;color:var(--text-muted);font-size:13px;">
            ${_('reason')}: ${reason}
          </div>
          <div class="section-title" style="margin-bottom:10px;">${_('events')}</div>
          <div class="event-list">
            ${round.Events?.length > 0 ? round.Events.map(e => `
              <div class="event-item">
                <div class="event-icon">-</div>
                <div class="event-content">${getEventDesc(e)}</div>
                ${e.Weapon ? `<span class="event-weapon">${e.Weapon}</span>` : ''}
              </div>
            `).join('') : `<p style="color:var(--text-muted);padding:10px;text-align:center;">No events</p>`}
          </div>
        </div>
      `;
    }

    function getReason(code) {
      const reasons = {
        1: _('tWin'),
        2: _('ctWin'),
        4: _('bombExploded'),
        5: _('bombDefused'),
        8: _('timeOut'),
        6: _('teamEliminated') + ' (T)',
        7: _('teamEliminated') + ' (CT)'
      };
      return reasons[code] || 'Unknown';
    }

    function getEventDesc(e) {
      if (e.Type === 'death') {
        const hs = e.Headshot ? ' (HS)' : '';
        return `${escapeHtml(e.Victim)} killed by ${escapeHtml(e.Attacker)}${hs}`;
      }
      if (e.Type === 'bomb_planted') return `${_('planted')}: ${escapeHtml(e.Player)}`;
      if (e.Type === 'bomb_defused') return `${_('defused')}: ${escapeHtml(e.Player)}`;
      return JSON.stringify(e);
    }

    function formatDuration(sec) {
      if (!sec) return '0:00';
      const m = Math.floor(sec / 60);
      const s = sec % 60;
      return `${m}:${s.toString().padStart(2, '0')}`;
    }

    // 地图名称翻译
    const mapNames = {
      'de_dust2': { en: 'Dust2', zh: '炙热沙城II' },
      'de_mirage': { en: 'Mirage', zh: '荒漠迷城' },
      'de_train': { en: 'Train', zh: '列车停放站' },
      'de_nuke': { en: 'Nuke', zh: '核子危机' },
      'de_cache': { en: 'Cache', zh: '死城之谜' },
      'de_cobblestone': { en: 'Cobblestone', zh: '古堡激战' },
      'de_vertigo': { en: 'Vertigo', zh: '殒命大厦' },
      'de_canals': { en: 'Canals', zh: '运河水城' },
      'de_ruby': { en: 'Ruby', zh: '红宝石酒镇' },
      'de_zoo': { en: 'Zoo', zh: '动物园' },
      'de_overpass': { en: 'Overpass', zh: '死亡游乐园' },
      'cs_workout': { en: 'Workout', zh: '健身中心' },
      'cs_agency': { en: 'Agency', zh: '办公大楼' },
      'cs_office': { en: 'Office', zh: '办公室' },
      'cs_italy': { en: 'Italy', zh: '意大利小镇' },
      'cs_assault': { en: 'Assault', zh: '仓库突击' },
      'ar_baggage': { en: 'Baggage', zh: '行李仓库' },
      'ar_shoots': { en: 'Shoots', zh: '山林小寨' },
      'de_lake': { en: 'Lake', zh: '湖畔激战' },
      'de_stmarc': { en: 'StMarc', zh: '圣马克镇' }
    };

    function getMapName(mapId) {
      if (!mapId) return 'Unknown';
      const map = mapNames[mapId.toLowerCase()];
      if (map) {
        return lang === 'zh' ? map.zh : map.en;
      }
      return mapId;
    }

    function escapeHtml(text) {
      if (!text) return '';
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    document.addEventListener('DOMContentLoaded', () => {
      const saved = localStorage.getItem('cs2-stats-lang') || 'en';
      setLang(saved);
      loadMatches();
    });
  </script>
</body>
</html>
